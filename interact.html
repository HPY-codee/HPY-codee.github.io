<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="gbk">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和奶龙一起玩  留言互动</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html">异星小奶龙</a></div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">龙龙档案</a></li>
                <li><a href="interact.html" class="active">龙龙互动</a></li>
            </ul>
        </div>
    </nav>


    <main class="container">
        <h2>给奶龙留言（动态表单验证）</h2>
        <div class="card">
            <p>写下你想对奶龙说的话，它会咕噜咕噜地开心一整天～</p>
            <form id="contactForm">
                <label>你的昵称：</label>
                <input type="text" id="name" placeholder="例如：龙龙的小粉丝" required>

                <label>邮箱（用于接收奶龙的回信）：</label>
                <input type="email" id="email" placeholder="your@example.com" required>

                <label>给奶龙的悄悄话：</label>
                <textarea id="message" rows="3" placeholder="奶龙好可爱！我想和你做朋友～"></textarea>

                <div id="formError" class="error-msg"></div>
                <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> 发送给奶龙</button>
            </form>
            <p class="tech-note">动态验证：非空 + 邮箱格式检查，提交后弹出模拟提示（无后台存储）</p>
        </div>

        <div class="hobby-grid" style="margin-top: 2rem;">
            <div class="hobby-card"><i class="fas fa-dragon"></i><h3>奶龙表情包</h3><p>咕噜噜～</p></div>
            <div class="hobby-card"><i class="fas fa-music"></i><h3>奶龙之歌</h3><p>“黄色小恐龙，快乐扭扭扭”</p></div>
            <div class="hobby-card"><i class="fas fa-cake-candles"></i><h3>奶龙生日会</h3><p>每年3.14，一起庆祝</p></div>
        </div>
    </main>
    <footer><p>2025 龙龙粉丝后援队</p></footer>
    <script src="js/main.js"></script>
</body>
</html>
