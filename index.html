<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱小奶龙</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html">异星小奶龙</a></div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="about.html">龙龙档案</a></li>
                <li><a href="interact.html">龙龙互动</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <div class="avatar"><img src="https://q2.itc.cn/q_70/images03/20250816/ed76d13351544afba6747be0626dd51b.png"  width="304" height="228"></div>
            <h1>奶龙<span>Nailong  治愈系小恐龙</span></h1>
            <p class="bio">一只来自异想世界的黄色小恐龙&爱吃、爱睡、爱卖萌&传递快乐与温暖</p>
        </section>

        <!-- 动态技术1: 实时时钟 -->
        <div class="card">
            <div class="card-header"><i class="fas fa-clock"></i>想你一晚又一晚，把爱你的心都填满</div>
            <div class="clock-box">
                <div id="liveDate"> </div>
                <div id="liveTime"> </div>
            </div>
            <p class="tech-note">动态网页技术：JavaScript setInterval 实时刷新时间</p>
        </div>

        <!-- 动态技术2: 显示/隐藏奶龙小秘密 -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-cookie-bite"></i> 奶龙的小秘密
                <button id="toggleMottoBtn" class="btn-sm">隐藏</button>
            </div>
            <div id="mottoContent">
                <p>奶龙最喜欢的食物：草莓布丁 + 蜂蜜松饼</p>
                <p>奶龙口头禅：“咕噜咕噜～ 今天也要开心鸭！”</p>
                <p>每天要睡12个小时，醒来就会元气满满～</p>
            </div>
        </div>
    </main>

    <footer>
        <p>2025 龙龙粉丝后援队</p>
    </footer>

    <script src="js/main.js"></script>
